# Alembic Configuration
# Run migrations: cd backend && alembic upgrade head
# Create new migration: cd backend && alembic revision --autogenerate -m "description"

[alembic]
script_location = alembic
prepend_sys_path = .

# SQLAlchemy URL — overridden in env.py to match app config
sqlalchemy.url = sqlite:///data/goldbeck.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
